<!DOCTYPE html>
<html lang="en" style="background:#030712">
<head>
  <meta charset="UTF-8" />
  <meta name="viewport" content="width=device-width, initial-scale=1.0" />
  <title>404 — Mohamed AYADI</title>
  <link rel="icon" type="image/svg+xml" href="/portfolio/assets/favicon.svg" />
  <link rel="preconnect" href="https://fonts.googleapis.com" />
  <link rel="preconnect" href="https://fonts.gstatic.com" crossorigin />
  <link href="https://fonts.googleapis.com/css2?family=Inter:wght@400;500;600;700;800&family=JetBrains+Mono:wght@400;500;600&display=swap" rel="stylesheet" />
  <style>
    *, *::before, *::after { box-sizing: border-box; margin: 0; padding: 0; }

    html, body {
      height: 100%;
      background: #030712;
      color: #f1f5f9;
      font-family: 'Inter', sans-serif;
      -webkit-font-smoothing: antialiased;
    }

    body {
      display: flex;
      align-items: center;
      justify-content: center;
      min-height: 100vh;
      overflow: hidden;
      position: relative;
    }

    /* Grid background */
    body::before {
      content: '';
      position: fixed;
      inset: 0;
      background-image:
        linear-gradient(rgba(96,165,250,0.03) 1px, transparent 1px),
        linear-gradient(90deg, rgba(96,165,250,0.03) 1px, transparent 1px);
      background-size: 48px 48px;
      pointer-events: none;
      z-index: 0;
    }

    /* Glow blobs */
    .blob {
      position: fixed;
      border-radius: 50%;
      filter: blur(80px);
      pointer-events: none;
      z-index: 0;
    }
    .blob-1 { width: 360px; height: 360px; background: rgba(96,165,250,0.07);  top: 15%;  right: 8%;  }
    .blob-2 { width: 240px; height: 240px; background: rgba(167,139,250,0.05); bottom: 20%; left: 5%; }

    .container {
      position: relative;
      z-index: 1;
      text-align: center;
      padding: 2rem;
      max-width: 560px;
      width: 100%;
    }

    .code-label {
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      color: rgba(96,165,250,0.7);
      letter-spacing: 0.05em;
      margin-bottom: 1.25rem;
      display: block;
    }

    .error-code {
      font-family: 'JetBrains Mono', monospace;
      font-size: clamp(80px, 20vw, 140px);
      font-weight: 800;
      line-height: 1;
      margin-bottom: 1.25rem;
      background: linear-gradient(135deg, #60a5fa 0%, #a78bfa 100%);
      -webkit-background-clip: text;
      -webkit-text-fill-color: transparent;
      background-clip: text;
      letter-spacing: -0.04em;
    }

    h1 {
      font-size: clamp(20px, 4vw, 28px);
      font-weight: 700;
      color: #f1f5f9;
      margin-bottom: 0.75rem;
      letter-spacing: -0.02em;
    }

    p {
      font-size: 15px;
      color: #64748b;
      line-height: 1.75;
      margin-bottom: 2.5rem;
    }

    .terminal {
      display: inline-block;
      text-align: left;
      background: rgba(255,255,255,0.03);
      border: 1px solid rgba(255,255,255,0.07);
      border-radius: 12px;
      padding: 1rem 1.25rem;
      margin-bottom: 2.5rem;
      font-family: 'JetBrains Mono', monospace;
      font-size: 13px;
      width: 100%;
    }

    .terminal .prompt { color: #60a5fa; }
    .terminal .cmd    { color: #94a3b8; }
    .terminal .out    { color: #475569; margin-top: 4px; }
    .terminal .cursor {
      display: inline-block;
      width: 2px;
      height: 14px;
      background: #60a5fa;
      vertical-align: middle;
      margin-left: 2px;
      animation: blink 1s step-end infinite;
    }

    @keyframes blink { 50% { opacity: 0; } }

    .btn {
      display: inline-flex;
      align-items: center;
      gap: 8px;
      padding: 0.75rem 1.75rem;
      background: #60a5fa;
      color: #030712;
      font-family: 'Inter', sans-serif;
      font-size: 14px;
      font-weight: 600;
      text-decoration: none;
      border-radius: 8px;
      transition: background 0.2s, transform 0.2s, box-shadow 0.2s;
      box-shadow: 0 8px 24px rgba(96,165,250,0.25);
    }

    .btn:hover {
      background: #93c5fd;
      transform: translateY(-2px);
      box-shadow: 0 12px 32px rgba(96,165,250,0.4);
    }

    .btn svg { flex-shrink: 0; }
  </style>
</head>
<body>
  <div class="blob blob-1"></div>
  <div class="blob blob-2"></div>

  <div class="container">
    <span class="code-label">// error</span>

    <div class="error-code">404</div>

    <h1>Page Not Found</h1>
    <p>The route you're looking for doesn't exist in this cluster.<br>Let's get you back to the main deployment.</p>

    <div class="terminal">
      <div><span class="prompt">$ </span><span class="cmd">kubectl get page /portfolio/???</span></div>
      <div class="out">Error: resource not found in namespace "portfolio"</div>
      <div style="margin-top:8px"><span class="prompt">$ </span><span class="cmd">cd /portfolio/</span><span class="cursor"></span></div>
    </div>

    <a href="/portfolio/" class="btn">
      <svg width="15" height="15" viewBox="0 0 24 24" fill="none" stroke="currentColor" stroke-width="2.5" stroke-linecap="round" stroke-linejoin="round">
        <path d="M19 12H5M12 5l-7 7 7 7"/>
      </svg>
      Back to Portfolio
    </a>
  </div>
</body>
</html>
